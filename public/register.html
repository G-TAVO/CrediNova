<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - CrediNova</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div style="max-width:400px;margin:auto;padding:20px">

<h1 style="text-align:center">CrediNova</h1>

<h2>Crear cuenta</h2>

<input id="regUser" placeholder="Usuario" style="width:100%;padding:10px;margin-top:10px">

<input id="regPass" type="password" placeholder="Contraseña" style="width:100%;padding:10px;margin-top:10px">

<input id="refer" placeholder="Código referido (opcional)" style="width:100%;padding:10px;margin-top:10px">

<button onclick="register()" style="width:100%;margin-top:10px;padding:10px;background:#22c55e;border:none;color:white;border-radius:8px">

Registrarse

</button>

<p style="margin-top:15px;text-align:center">

¿Ya tienes cuenta?

<a href="login.html">Iniciar sesión</a>

</p>

</div>

<script src="app.js"></script>

</body>

</html>
